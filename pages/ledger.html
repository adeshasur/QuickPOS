<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>QuickPOS Pro — Credit Ledger</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/sidebar.css">
    <link rel="stylesheet" href="../assets/css/ledger.css">
</head>
<body class="dashboard-body">
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div id="topbar-container"></div>

        <div class="ledger-container">
            <div class="page-header">
                <div class="page-header-left">
                    <div class="page-heading">Credit Ledger</div>
                    <div class="page-sub">Track pending credit bills, settlements, and payment collection history</div>
                </div>
            </div>

            <div class="outstanding-card">
                <span class="outstanding-label"><span class="material-symbols-rounded s24" style="vertical-align:middle;">menu_book</span> Total Outstanding Credit</span>
                <span class="outstanding-number" id="totalOutstanding">LKR 0.00</span>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" id="pendingTab">Pending Bills</button>
                <button class="tab-btn" id="settledTab">Settled Bills</button>
            </div>

            <div class="table-wrapper">
                <table id="ledgerTable">
                    <thead>
                        <tr>
                            <th>Date</th><th>Bill ID</th><th>Customer Name</th><th>Total Amount</th><th>Remaining Balance</th><th>Status</th><th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="payment-modal" id="paymentModal">
        <div class="payment-modal-content">
            <div class="modal-header">
                <div class="modal-title">Collect Payment</div>
                <button class="close-modal" id="closePaymentModal"><span class="material-symbols-rounded">close</span></button>
            </div>
            <div class="modal-body">
                <div class="amount-row">
                    <span class="amount-label">Bill ID:</span>
                    <span class="amount-value" id="modalBillId">#---</span>
                </div>
                <div class="amount-row">
                    <span class="amount-label">Remaining:</span>
                    <span class="amount-value total" id="modalRemaining">LKR 0.00</span>
                </div>
                <div class="input-group">
                    <label>Amount Received (LKR)</label>
                    <input type="number" class="amount-input" id="paymentAmount" step="0.01" min="0.01" placeholder="0.00">
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="cancelPayment">Cancel</button>
                <button class="modal-btn primary" id="confirmPayment">Confirm Payment</button>
            </div>
        </div>
    </div>

    <div id="print-area" style="display: none;"></div>

    <script src="../assets/js/notifications.js"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/ledger.js"></script>
</body>
</html>
