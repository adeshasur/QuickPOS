<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPOS Pro - User Management</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/users.css">
</head>
<body>
    <div class="sidebar expanded" id="sidebar">
        <div class="hamburger-menu">
            <button class="hamburger-btn" id="hamburgerBtn"><span id="hamburgerIcon">☰</span></button>
            <div class="logo" id="logo">QuickPOS</div>
        </div>
        <div class="nav-items">
            <a href="owner_dashboard.html" class="nav-item owner-only"><span class="nav-icon">📋</span><span class="nav-text">Dashboard</span></a>
            <a href="sales.html" class="nav-item"><span class="nav-icon">💰</span><span class="nav-text">Make a Sale</span></a>
            <a href="categories.html" class="nav-item"><span class="nav-icon">🏷️</span><span class="nav-text">Categories</span></a>
            <a href="products.html" class="nav-item"><span class="nav-icon">📦</span><span class="nav-text">Products</span></a>
            <a href="inventory.html" class="nav-item"><span class="nav-icon">🚚</span><span class="nav-text">Inventory</span></a>
            <a href="customers.html" class="nav-item"><span class="nav-icon">👤</span><span class="nav-text">Customers</span></a>
            <a href="quotations.html" class="nav-item"><span class="nav-icon">📄</span><span class="nav-text">Quotations</span></a>
            <a href="ledger.html" class="nav-item"><span class="nav-icon">📒</span><span class="nav-text">Credit Ledger</span></a>
            <a href="sales_reports.html" class="nav-item"><span class="nav-icon">🧾</span><span class="nav-text">Invoice History</span></a>
            <a href="reports.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-text">Shift Reports</span></a>
            <a href="users.html" class="nav-item active owner-only"><span class="nav-icon">👥</span><span class="nav-text">Users</span></a>
            <a href="settings.html" class="nav-item owner-only"><span class="nav-icon">⚙️</span><span class="nav-text">Settings</span></a>
            <a href="#" class="nav-item" id="logoutBtn"><span class="nav-icon">🚪</span><span class="nav-text">Logout</span></a>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">Staff Management</div>
            <div class="header-controls">
                <button class="create-user-btn" id="createUserBtn"><span>+</span> Create New User</button>
            </div>
        </div>
        
        <div class="user-management-content">
            <div class="staff-table-section">
                <div class="section-header"><div class="section-title"><span>👥</span> Staff Members</div></div>
                <div class="table-container">
                    <table class="staff-table">
                        <thead>
                            <tr><th>User ID</th><th>Full Name</th><th>Username</th><th>Role</th><th>Status</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="staffTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="userModalOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title"><span>👤</span> User Details</div>
                <button class="close-modal" id="closeModalBtn">×</button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Full Name *</label><input type="text" class="form-input" id="userName"></div>
                    <div class="form-group"><label class="form-label">Username *</label><input type="text" class="form-input" id="userUsername"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Role *</label>
                        <select class="form-select" id="userRole">
                            <option value="cashier">Cashier</option>
                            <option value="owner">Owner</option>
                        </select>
                    </div>
                    <div class="form-group" style="justify-content:center;">
                        <label class="toggle-switch">
                            <input type="checkbox" class="toggle-checkbox" id="canViewReports" checked>
                            <span class="toggle-slider"></span>
                        </label>
                        <span style="font-size:13px; margin-left:10px;">Can View Reports</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel" id="cancelModalBtn">Cancel</button>
                <button class="modal-btn submit" id="submitUserBtn">Save User</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/users.js"></script>
</body>
</html>
