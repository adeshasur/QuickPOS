<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPOS Pro - User Management</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/sidebar.css">
    <link rel="stylesheet" href="../assets/css/users.css">
</head>
<body class="dashboard-body">
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div id="topbar-container"></div>
        
        <div class="user-management-content">
            <div class="staff-table-section">
                <div class="section-header" style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
                    <div class="section-title"><span class="material-symbols-rounded">group</span> Staff Members</div>
                    <button id="createUserBtn" class="modal-btn submit" style="max-width:180px;">Create User</button>
                </div>
                <div class="table-container">
                    <table class="staff-table">
                        <thead>
                            <tr><th>User ID</th><th>Full Name</th><th>Username</th><th>Role</th><th>Status</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="staffTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="userModalOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title"><span class="material-symbols-rounded">person</span> User Details</div>
                <button class="close-modal" id="closeModalBtn"><span class="material-symbols-rounded">close</span></button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Full Name *</label><input type="text" class="form-input" id="userName"></div>
                    <div class="form-group"><label class="form-label">Username *</label><input type="text" class="form-input" id="userUsername"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Role *</label>
                        <select class="form-select" id="userRole">
                            <option value="cashier">Cashier</option>
                            <option value="owner">Owner</option>
                        </select>
                    </div>
                    <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" id="userPassword" placeholder="Leave blank to keep current"></div>
                    <div class="form-group" style="justify-content:center;">
                        <label class="toggle-switch">
                            <input type="checkbox" class="toggle-checkbox" id="canViewReports" checked>
                            <span class="toggle-slider"></span>
                        </label>
                        <span style="font-size:13px; margin-left:10px;">Can View Reports</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel" id="cancelModalBtn">Cancel</button>
                <button class="modal-btn submit" id="submitUserBtn">Save User</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/users.js"></script>
</body>
</html>
