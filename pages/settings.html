<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPOS Pro - Settings</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/settings.css">
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div id="topbar-container"></div>
        
        <div class="settings-dashboard">
            <div class="settings-header">
                <div class="header-title"><span>⚙️</span> System Configuration</div>
                <div class="header-controls">
                    <button class="settings-btn reset-btn" id="resetBtn"><span>🔄</span> Reset System</button>
                    <button class="settings-btn save-btn" id="saveBtn"><span>💾</span> Save Settings</button>
                </div>
            </div>
            
            <div class="settings-cards">
                <div class="settings-card">
                    <div class="card-header">
                        <div class="card-icon">🏪</div>
                        <div><div class="card-title">Store Information</div></div>
                    </div>
                    <div class="form-groups">
                        <div class="form-group">
                            <label class="form-label required">Store Name</label>
                            <input type="text" class="form-input" id="storeName">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Address</label>
                            <input type="text" class="form-input" id="storeAddress">
                        </div>
                    </div>
                </div>

                <div class="settings-card">
                    <div class="card-header">
                        <div class="card-icon">🚀</div>
                        <div><div class="card-title">System Version</div></div>
                    </div>
                    <div class="version-selector" id="versionSelector">
                        <div class="version-option" data-version="lite">
                            <div class="version-name">Lite</div>
                        </div>
                        <div class="version-option" data-version="pro">
                            <div class="version-name">Pro</div>
                        </div>
                    </div>
                    <div class="form-hint warning" id="versionHint">Change versions to toggle advanced features.</div>
                </div>

                <div class="settings-card">
                    <div class="card-header">
                        <div class="card-icon">🔒</div>
                        <div class="card-title">Security</div>
                    </div>
                    <div class="form-groups">
                        <div class="form-group">
                            <label class="form-label">New Owner Password</label>
                            <input type="password" class="form-input" id="adminPassword">
                        </div>
                        <div class="form-group">
                            <label class="form-label">New Cashier Password</label>
                            <input type="password" class="form-input" id="cashierPassword">
                        </div>
                    </div>
                </div>

                <div class="settings-card">
                    <div class="card-header">
                        <div class="card-icon">🌍</div>
                        <div class="card-title">Regional</div>
                    </div>
                    <div class="form-groups">
                        <div class="form-group">
                            <label class="form-label">Tax (%)</label>
                            <input type="number" class="form-input" id="taxPercentage">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Shift Hours</label>
                            <input type="text" class="form-input" id="shiftHours">
                        </div>
                    </div>
                </div>
            </div>

            <div class="footer-actions">
                <div class="system-info">QuickPOS Hardware | <span class="system-version">v1.0.0</span></div>
                <button class="settings-btn" id="clearCacheBtn" style="background:#eee;">🗑️ Clear Cache</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/settings.js"></script>
</body>
</html>
