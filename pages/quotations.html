<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPOS Pro - Purchase Order</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/quotations.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div id="topbar-container"></div>

        <div class="dashboard">
            <div class="products-section">
                <div class="section-header">
                    <div class="section-title">Supermarket Items</div>
                    <div class="category-filter">
                        <button class="category-btn active" data-category="all">All</button>
                        <button class="category-btn" data-category="grocery">Grocery</button>
                        <button class="category-btn" data-category="dairy">Dairy</button>
                        <button class="category-btn" data-category="beverages">Beverages</button>
                        <button class="category-btn" data-category="vegetables">Vegetables</button>
                    </div>
                </div>
                <div class="products-grid" id="productsGrid"></div>
            </div>

            <div class="quotation-side">
                <div class="quotation-header">
                    <div class="quotation-title">Purchase Order</div>
                    <div class="quotation-count">Items: <span id="quoteItemCount">0</span></div>
                </div>
                <div class="customer-details">
                    <div class="customer-field">
                        <label>Supplier Name</label>
                        <input type="text" id="customerName" value="Main Supplier">
                    </div>
                    <div class="customer-field">
                        <label>Contact No</label>
                        <input type="text" id="customerPhone" placeholder="07X XXX XXXX">
                    </div>
                    <div class="customer-field">
                        <label>Expected Delivery</label>
                        <input type="date" id="validUntil">
                    </div>
                </div>
                <div class="quotation-items" id="quotationItems">
                    <div class="empty-quote"><div class="empty-quote-icon"><span class="material-symbols-rounded s48">description</span></div><p>No items added</p></div>
                </div>
                <div class="quotation-footer">
                    <div class="total-row">
                        <div class="total-label">Total (LKR):</div>
                        <div class="total-amount" id="quoteTotal">0.00</div>
                    </div>
                    <button class="pdf-button" id="generatePDFBtn"><span class="material-symbols-rounded s20" style="vertical-align:middle; margin-right:8px;">shopping_cart_checkout</span> Generate Purchase Order PDF</button>
                </div>
            </div>
        </div>
    </div>

    <div class="customize-modal" id="customizeModal">
        <div class="customize-modal-content">
            <div class="modal-header">
                <div class="modal-title" id="customizeProductName">Product</div>
                <button class="close-customize" id="closeCustomizeBtn"><span class="material-symbols-rounded">close</span></button>
            </div>
            <div class="unit-price-display">
                <span>Unit price</span>
                <span id="unitPriceDisplay">LKR 0.00</span>
            </div>
            <div class="input-group-sm">
                <label>Quantity (kg/g/pkt/bottle)</label>
                <input type="number" id="customQty" step="0.01" min="0.01" value="1.00">
            </div>
            <div class="price-group-big">
                <label><span class="material-symbols-rounded s18" style="vertical-align:middle; margin-right:4px;">payments</span> Price (LKR) — edit manually</label>
                <input type="number" id="customPrice" step="0.01" min="0">
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="cancelCustomizeBtn">Cancel</button>
                <button class="modal-btn primary" id="addCustomToCartBtn">Add to Cart</button>
            </div>
        </div>
    </div>

    <div class="pdf-preview-modal" id="pdfPreviewModal">
        <button class="pdf-preview-close" id="closePreviewBtn"><span class="material-symbols-rounded">close</span></button>
        <div id="pdfPreviewContainer" style="margin-top: 20px;"></div>
        <div class="pdf-preview-actions">
            <button class="pdf-action-btn secondary" id="editQuoteBtn"><span class="material-symbols-rounded s18" style="vertical-align:middle; margin-right:4px;">edit</span> Edit</button>
            <button class="pdf-action-btn primary" id="downloadPdfBtn"><span class="material-symbols-rounded s18" style="vertical-align:middle; margin-right:4px;">download</span> Download PDF</button>
        </div>
    </div>

    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/quotations.js"></script>
</body>
</html>
