<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPOS Pro - Invoice History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/sidebar.css">
    <link rel="stylesheet" href="../assets/css/sales_reports.css">
</head>
<body class="dashboard-body">
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div id="topbar-container"></div>

        <div class="content">
            <div class="page-header">
                <div class="page-header-left">
                    <div class="page-heading">Invoice History</div>
                    <div class="page-sub">View all processed invoices with filters, payment details, and printable receipts</div>
                </div>
            </div>

            <!-- 3-Card KPI Grid -->
            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-icon blue">
                        <span class="material-symbols-rounded">receipt_long</span>
                    </div>
                    <div class="kpi-info">
                        <span class="kpi-label">Total Invoices</span>
                        <span class="kpi-val" id="kpiTotalInvoices">0</span>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon green">
                        <span class="material-symbols-rounded">payments</span>
                    </div>
                    <div class="kpi-info">
                        <span class="kpi-label">Total Revenue</span>
                        <span class="kpi-val" id="kpiTotalRevenue">LKR 0.00</span>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon orange">
                        <span class="material-symbols-rounded">today</span>
                    </div>
                    <div class="kpi-info">
                        <span class="kpi-label">Today's Sales</span>
                        <span class="kpi-val" id="kpiTodaySales">LKR 0.00</span>
                    </div>
                </div>
            </div>

            <div class="page-body">
                <div class="filters-bar">
                    <div class="search-wrap">
                        <span class="search-icon"><span class="material-symbols-rounded">search</span></span>
                        <input type="search" class="search-input" id="searchInput" placeholder="Search Bill ID or Items...">
                    </div>
                    <div class="filter-controls-right">
                        <div class="date-tabs">
                            <button class="dtab active" data-d="all" onclick="setDateTab(this)">All Time</button>
                            <button class="dtab" data-d="today" onclick="setDateTab(this)">Today</button>
                            <button class="dtab" data-d="week" onclick="setDateTab(this)">This Week</button>
                        </div>
                        <select class="pay-filter" id="payFilter" onchange="renderTable()">
                            <option value="">All Payments</option>
                            <option value="Cash">Cash</option>
                            <option value="Card">Card</option>
                            <option value="Credit">Credit</option>
                        </select>
                    </div>
                </div>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Invoice</th><th>Date & Time</th><th>Items</th><th>Payment</th><th style="text-align:right;">Total</th><th style="text-align:right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="salesBody"></tbody>
                    </table>
                    <div id="emptyState" style="display:none;" class="empty-state">No bills found.</div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-bg" id="receiptModal">
        <div class="modal-box">
            <div class="modal-hdr">
                <span class="modal-ttl">Bill Preview</span>
                <button class="modal-cls" onclick="closeReceipt()">x</button>
            </div>
            <div class="modal-body" id="receiptBody"></div>
            <div style="padding:20px; border-top:1px solid #eee; display:flex; gap:10px;">
                <button class="mbtn close" onclick="closeReceipt()" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ccc; background:#fff; cursor:pointer;">Close</button>
                <button id="printReceiptBtn" style="flex:1; padding:10px; border-radius:8px; border:none; background:var(--primary); color:#fff; cursor:pointer;">Print Bill</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/notifications.js"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/sales_reports.js"></script>
</body>
</html>
