<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPOS - Invoice History</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/sales_reports.css">
</head>
<body>
    <div class="sidebar expanded" id="sidebar">
        <div class="hamburger-menu">
            <button class="hamburger-btn" id="hamburgerBtn"><span id="hamburgerIcon">☰</span></button>
            <div class="logo" id="logo">QuickPOS</div>
        </div>
        <div class="nav-items">
            <a href="owner_dashboard.html" class="nav-item owner-only"><span class="nav-icon">📋</span><span class="nav-text">Dashboard</span></a>
            <a href="sales.html" class="nav-item"><span class="nav-icon">💰</span><span class="nav-text">Make a Sale</span></a>
            <a href="categories.html" class="nav-item"><span class="nav-icon">🏷️</span><span class="nav-text">Categories</span></a>
            <a href="products.html" class="nav-item"><span class="nav-icon">📦</span><span class="nav-text">Products</span></a>
            <a href="inventory.html" class="nav-item"><span class="nav-icon">🚚</span><span class="nav-text">Inventory</span></a>
            <a href="customers.html" class="nav-item"><span class="nav-icon">👤</span><span class="nav-text">Customers</span></a>
            <a href="quotations.html" class="nav-item"><span class="nav-icon">📄</span><span class="nav-text">Quotations</span></a>
            <a href="ledger.html" class="nav-item"><span class="nav-icon">📒</span><span class="nav-text">Credit Ledger</span></a>
            <a href="sales_reports.html" class="nav-item active"><span class="nav-icon">🧾</span><span class="nav-text">Invoice History</span></a>
            <a href="reports.html" class="nav-item owner-only"><span class="nav-icon">📊</span><span class="nav-text">Shift Reports</span></a>
            <a href="users.html" class="nav-item owner-only"><span class="nav-icon">👥</span><span class="nav-text">Users</span></a>
            <a href="settings.html" class="nav-item owner-only"><span class="nav-icon">⚙️</span><span class="nav-text">Settings</span></a>
            <a href="#" class="nav-item" id="logoutBtn"><span class="nav-icon">🚪</span><span class="nav-text">Logout</span></a>
        </div>
    </div>

    <div class="main-area">
        <div class="topbar">
            <div class="topbar-title">Invoice History</div>
            <div class="user-info">
                <span id="cashierName" style="color:var(--text-light); font-size:14px;">Loading...</span>
                <div class="user-avatar">👤</div>
            </div>
        </div>

        <div class="page-body">
            <div class="filters-bar">
                <div class="filters-row">
                    <div class="search-wrap">
                        <span class="search-icon">🔍</span>
                        <input type="search" class="search-input" id="searchInput" placeholder="Search Bill ID or Items...">
                    </div>
                    <div class="date-tabs">
                        <button class="dtab active" data-d="all" onclick="setDateTab(this)">All Time</button>
                        <button class="dtab" data-d="today" onclick="setDateTab(this)">Today</button>
                        <button class="dtab" data-d="week" onclick="setDateTab(this)">This Week</button>
                    </div>
                    <select class="pay-filter" id="payFilter" onchange="renderTable()">
                        <option value="">All Payments</option>
                        <option value="Cash">Cash</option>
                        <option value="Bank">Bank/Card</option>
                    </select>
                </div>
                <div class="summary-row" id="summaryRow"></div>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Invoice</th><th>Date & Time</th><th>Items</th><th>Payment</th><th style="text-align:right;">Total</th><th style="text-align:right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="salesBody"></tbody>
                </table>
                <div id="emptyState" style="display:none;" class="empty-state">No bills found.</div>
            </div>
        </div>
    </div>

    <div class="modal-bg" id="receiptModal">
        <div class="modal-box">
            <div class="modal-hdr">
                <span class="modal-ttl">Bill Preview</span>
                <button class="modal-cls" onclick="closeReceipt()">×</button>
            </div>
            <div class="modal-body" id="receiptBody"></div>
            <div style="padding:20px; border-top:1px solid #eee; display:flex; gap:10px;">
                <button class="mbtn close" onclick="closeReceipt()" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ccc; background:#fff; cursor:pointer;">Close</button>
                <button id="printReceiptBtn" style="flex:1; padding:10px; border-radius:8px; border:none; background:var(--primary-color); color:#fff; cursor:pointer;">Print Bill</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/sales_reports.js"></script>
</body>
</html>
