<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPOS Pro - Customers</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/customers.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div id="topbar-container"></div>

        <div class="customers-dashboard">
            <div class="customers-header">
                <div class="search-wrapper">
                    <span class="material-symbols-rounded search-icon">search</span>
                    <input type="text" id="customerSearch" placeholder="Search by name or phone...">
                </div>
                <button class="add-customer-btn" id="addCustomerBtn">
                    <span class="material-symbols-rounded">add</span> Add New Customer
                </button>
            </div>

            <div class="table-container">
                <div class="table-wrapper">
                    <table class="customers-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Address</th>
                                <th>Balance (LKR)</th>
                                <th class="action-cell">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="customerTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="customerModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Add Customer</div>
                <button class="close-modal" id="closeModalBtn"><span class="material-symbols-rounded">close</span></button>
            </div>
            <form id="customerForm">
                <input type="hidden" id="customerId" value="">
                <div class="form-group">
                    <label class="form-label" for="custName">Full Name *</label>
                    <input type="text" class="form-input" id="custName" placeholder="e.g. Kamal Perera" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="custPhone">Phone Number *</label>
                    <input type="tel" class="form-input" id="custPhone" placeholder="e.g. 0771234567" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="custAddress">Address</label>
                    <input type="text" class="form-input" id="custAddress" placeholder="e.g. Colombo 03">
                </div>
                <input type="hidden" id="custBalance" value="0">
                <div class="modal-actions">
                    <button type="button" class="modal-btn cancel" id="cancelModalBtn">Cancel</button>
                    <button type="submit" class="modal-btn primary" id="saveCustomerBtn">Save Customer</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="deleteModal">
        <div class="modal-content" style="max-width:400px;">
            <div class="modal-header">
                <div class="modal-title">Confirm Delete</div>
                <button class="close-modal" id="closeDeleteModalBtn"><span class="material-symbols-rounded">close</span></button>
            </div>
            <div class="modal-body" style="padding: 20px 0; text-align: center;">
                <p style="margin-bottom: 16px;">Are you sure you want to delete this customer?</p>
                <p style="color: var(--danger-color); font-size: 13px;">This action cannot be undone.</p>
            </div>
            <div class="modal-actions" style="justify-content: center;">
                <button class="modal-btn cancel" id="cancelDeleteBtn">Cancel</button>
                <button class="modal-btn danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/customers.js"></script>
</body>
</html>
