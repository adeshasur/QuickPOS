<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPOS Pro - Customers</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/customers.css">
</head>
<body>

    <div id="sidebar-container"></div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">Customer Management</div>
            <div class="user-info">
                <span id="userRoleDisplay" style="color:var(--text-light); font-size:14px;">Loading...</span>
                <div class="user-avatar" id="userAvatar">AD</div>
            </div>
        </div>

        <div class="customers-container">
            <div class="customers-header">
                <div class="search-wrap">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="customerSearch" placeholder="Search by name or phone...">
                </div>
                <button class="add-btn" id="addCustomerBtn">➕ Add New Customer</button>
            </div>

            <div class="table-section">
                <div class="table-wrapper">
                    <table class="customer-table" id="customerTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Address</th>
                                <th>Balance (LKR)</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="customerTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/customers.js"></script>
</body>
</html>
