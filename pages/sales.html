<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPOS Pro - Make a Sale</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/sales.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div id="topbar-container"></div>

        <div class="dashboard">
            <div class="products-section">
                <div class="section-header">
                    <div class="section-title">Products</div>
                    <div class="category-filter">
                        <button class="category-btn active" data-category="all">All</button>
                        <button class="category-btn" data-category="grocery">Grocery</button>
                        <button class="category-btn" data-category="dairy">Dairy</button>
                        <button class="category-btn" data-category="beverages">Beverages</button>
                        <button class="category-btn" data-category="vegetables">Vegetables</button>
                    </div>
                </div>
                <div class="quick-stock-check">
                    <div class="search-wrap" style="position:relative; width:100%;">
                        <span class="material-symbols-rounded" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:20px; color:var(--text-light);">barcode_scanner</span>
                        <input type="text" id="stockSearch" placeholder="Scan Barcode or Search Products..." style="padding-left:40px;" autofocus>
                    </div>
                    <span id="stockResult"></span>
                </div>
                <div class="products-grid" id="productsGrid"></div>
            </div>

            <div class="cart-section">
                <div class="cart-header">
                    <div class="cart-title">Current Sale</div>
                    <div class="cart-count">Items: <span id="itemCount">0</span></div>
                </div>
                
                <div class="customer-selector">
                    <div class="customer-search-wrapper">
                        <span class="material-symbols-rounded customer-search-icon">search</span>
                        <input type="text" class="customer-search-input" id="customerSearch" placeholder="Search customer by name or phone...">
                        <div class="customer-search-results" id="customerSearchResults"></div>
                    </div>
                    <div id="selectedCustomerDisplay">
                        <div class="walkin-indicator">
                            <span class="material-symbols-rounded">person</span> Walk-in Customer (credit not available)
                        </div>
                    </div>
                </div>

                <div class="cart-items" id="cartItems">
                    </div>
                
                <div class="cart-footer">
                    <div class="total-row">
                        <div class="total-label">Total Amount:</div>
                        <div class="total-amount" id="totalAmount">LKR 0.00</div>
                    </div>
                    <div class="payment-buttons">
                        <button class="payment-btn cash" id="cashPaymentBtn"><span class="material-symbols-rounded">payments</span> CASH</button>
                        <button class="payment-btn card" id="cardPaymentBtn"><span class="material-symbols-rounded">credit_card</span> CARD</button>
                        <button class="payment-btn credit" id="creditPaymentBtn" disabled><span class="material-symbols-rounded">history_edu</span> CREDIT</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="customize-modal" id="customizeModal">
        <div class="customize-modal-content">
            <div class="modal-header">
                <div class="modal-title" id="customizeProductName">Product</div>
                <button class="close-customize" id="closeCustomizeBtn">&times;</button>
            </div>
            <div class="unit-price-display">
                <span>Unit price</span>
                <span id="unitPriceDisplay">LKR 0.00</span>
            </div>
            <div class="input-group-sm">
                <label>Quantity (kg/g/pkt/bottle)</label>
                <input type="number" id="customQty" step="0.01" min="0.01" value="1.00">
            </div>
            <div class="price-group-big">
                <label><span class="material-symbols-rounded s18" style="vertical-align:middle;">payments</span> Price (LKR)</label>
                <input type="number" id="customPrice" step="0.01" min="0" placeholder="0.00">
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="cancelCustomizeBtn">Cancel</button>
                <button class="modal-btn primary" id="addCustomToCartBtn">Add to Cart</button>
            </div>
        </div>
    </div>

    <div class="payment-modal" id="paymentModal">
        <div class="payment-modal-content">
            <div class="modal-header">
                <div class="modal-title">Cash Payment</div>
                <button class="close-modal" id="closePaymentModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="amount-row">
                    <span class="amount-label">Total:</span>
                    <span class="amount-value total" id="modalTotalAmount">LKR 0.00</span>
                </div>
                <div class="input-group">
                    <label>Amount Received (LKR)</label>
                    <input type="number" class="amount-input" id="amountReceived" step="0.01" min="0" placeholder="0.00">
                </div>
                <div class="quick-cash-buttons">
                    <button class="quick-cash-btn" data-amount="100">+100</button>
                    <button class="quick-cash-btn" data-amount="500">+500</button>
                    <button class="quick-cash-btn" data-amount="1000">+1000</button>
                    <button class="quick-cash-btn" data-amount="5000">+5000</button>
                </div>
                <div class="amount-row">
                    <span class="amount-label">Change:</span>
                    <span class="amount-value balance" id="balanceAmount">LKR 0.00</span>
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="cancelPaymentBtn">Cancel</button>
                <button class="modal-btn primary" id="finalizePaymentBtn">Complete Sale</button>
            </div>
        </div>
    </div>

    <div class="sale-complete-overlay" id="saleCompleteOverlay">
        <div class="sale-complete-card">
            <div class="sale-complete-icon">✅</div>
            <div class="sale-complete-title" id="saleCompleteTitle">Sale Complete!</div>
            <div class="sale-complete-amount" id="saleCompleteAmount">LKR 0.00</div>
            <div class="sale-complete-message" id="saleCompleteMessage">Receipt printed successfully</div>
            <button class="close-overlay-btn" id="closeOverlayBtn">Continue</button>
        </div>
    </div>

    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/sales.js"></script>
</body>
</html>
