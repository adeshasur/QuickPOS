<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPOS Login</title>
    <link rel="stylesheet" href="../assets/css/login.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand-header">
                <h1 class="brand-logo"><span class="quick">Quick</span><span class="pos">POS</span></h1>
            </div>

            <h2 class="welcome-title">Welcome Back</h2>
            <p class="welcome-subtitle">Please enter your credentials to continue</p>

            <div class="error-message" id="errorMessage">
                <span class="material-symbols-rounded s18">warning</span> Invalid username or password
            </div>

            <div class="role-toggle" id="roleToggle">
                <button type="button" class="role-btn active" data-role="cashier">Cashier</button>
                <button type="button" class="role-btn" data-role="owner">Owner</button>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" id="password" class="form-input" placeholder="Password" required>
                        <button type="button" class="password-toggle" id="passwordToggle"><span class="material-symbols-rounded">visibility</span></button>
                    </div>
                </div>

                <button type="submit" class="login-button" id="loginBtn">
                    <span>Secure Login</span>
                    <div class="loading" id="loadingSpinner"></div>
                </button>
            </form>

            <div class="footer-note">
                <a href="#" class="footer-link" id="forgotPassword">Forgot Password?</a>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        const errorMessage = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');
        const roleToggle = document.getElementById('roleToggle');
        const forgotPasswordLink = document.getElementById('forgotPassword');

        let selectedRole = 'cashier';

        roleToggle.addEventListener('click', (e) => {
            const btn = e.target.closest('.role-btn');
            if (!btn) return;
            selectedRole = btn.dataset.role;
            document.querySelectorAll('.role-btn').forEach((b) => b.classList.remove('active'));
            btn.classList.add('active');
            errorMessage.classList.remove('show');
        });

        passwordToggle.addEventListener('click', function() {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.innerHTML = type === 'password'
                ? '<span class="material-symbols-rounded">visibility</span>'
                : '<span class="material-symbols-rounded">visibility_off</span>';
        });

        forgotPasswordLink.addEventListener('click', function(e) {
            e.preventDefault();
            alert('For password reset, contact your system administrator.');
        });

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            errorMessage.classList.remove('show');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<div class="loading" style="display:block"></div><span>Logging in...</span>';

            try {
                const result = await window.api.loginAuth({ username, password, role: selectedRole });
                if (result.success) {
                    localStorage.setItem('quickpos-user', JSON.stringify({
                        name: result.user.name,
                        role: result.user.role,
                        canViewReports: !!result.user.canViewReports,
                        username,
                        timestamp: new Date().toISOString()
                    }));
                    window.location.href = result.user.role === 'owner' ? 'owner_dashboard.html' : 'sales.html';
                    return;
                }

                errorMessage.classList.add('show');
            } catch (err) {
                alert('Login error: ' + err.message);
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span>Secure Login</span><div class="loading" id="loadingSpinner"></div>';
            }
        });

        document.addEventListener('DOMContentLoaded', () => usernameInput.focus());
    </script>
</body>
</html>
