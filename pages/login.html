<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>QuickPOS Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <link rel="stylesheet" href="../assets/css/make_login.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <div class="brand-area">
            <h1 class="brand-title">
                <span class="blue">Quick</span><span class="orange">POS</span>
                <span class="supermarket">Supermarket</span>
            </h1>
            <p class="brand-subtitle">by Fides.M</p>
            <div class="logo-box">
                <i class="fa-solid fa-cart-shopping"></i>
            </div>
        </div>

        <div class="welcome">
            <h2>Welcome Back</h2>
        </div>

        <div class="role-switch">
            <button class="role-btn active" id="ownerBtn">Owner</button>
            <button class="role-btn" id="cashierBtn">Cashier</button>
        </div>

        <div class="error-box" id="errorBox">
            <i class="fa-solid fa-circle-exclamation"></i>
            Invalid username or password
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="label">Username</label>
                <div class="input-wrap">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" id="username" class="input" placeholder="Enter your username" required>
                </div>
            </div>

            <div class="form-group">
                <label class="label">Password</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" class="input" placeholder="Enter your password" required>
                    <button type="button" class="toggle-btn" id="togglePassword">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="options">
                <label class="remember">
                    <input type="checkbox"> Remember Me
                </label>
                <a href="#" class="forgot">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">Login to Dashboard</button>
        </form>

        <div class="footer">
            Smart, Fast & Offline-Ready Supermarket System
        </div>

    </div>
</div>

<script src="../assets/js/make_login.js"></script>
</body>
</html>
