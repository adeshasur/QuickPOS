<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPOS Pro - Inventory Management</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/inventory.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div id="topbar-container"></div>

        <div class="inventory-container">
            <div class="stock-in-card owner-only">
                <div class="card-title">
                    <span class="material-symbols-rounded">add</span> Add New Stock
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Category *</label>
                        <select class="form-select" id="stockCategory">
                            <option value="">Select Category</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Product *</label>
                        <select class="form-select" id="stockProduct">
                            <option value="">Select Product</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Quantity *</label>
                        <input type="number" class="form-control" id="stockQuantity" min="1" value="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Cost Price (LKR) *</label>
                        <input type="number" class="form-control" id="stockCostPrice" step="0.01" min="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Selling Price (LKR) *</label>
                        <input type="number" class="form-control" id="stockSellingPrice" step="0.01" min="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Expiry Date *</label>
                        <input type="date" class="form-control" id="stockExpiryDate">
                    </div>
                </div>
                <div style="margin-top: 20px; text-align: right;">
                    <button class="update-btn" id="addStockBtn"><span class="material-symbols-rounded s18" style="vertical-align:middle;">add</span> Add to Inventory</button>
                </div>
            </div>

            <div class="expiry-filters">
                <span style="font-weight: 600;">Filter by Expiry:</span>
                <div class="filter-badge active" data-filter="all">All Stock</div>
                <div class="filter-badge" data-filter="good"><span class="material-symbols-rounded success s18" style="vertical-align:middle;">check_circle</span> Good (30+ days)</div>
                <div class="filter-badge expiring" data-filter="expiring"><span class="material-symbols-rounded warning s18" style="vertical-align:middle;">warning</span> Expiring Soon (&lt;30 days)</div>
                <div class="filter-badge expired" data-filter="expired"><span class="material-symbols-rounded danger s18" style="vertical-align:middle;">dangerous</span> Expired</div>
            </div>

            <div class="stock-history-section">
                <div class="section-header">
                    <div class="section-title">
                        <span class="material-symbols-rounded">inventory</span> Stock Inventory (with Expiry Dates)
                    </div>
                    <input type="text" class="search-box" id="stockSearch" placeholder="Search products...">
                </div>
                <div class="table-container">
                    <table class="stock-table" id="stockTable">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Category</th>
                                <th>Quantity</th>
                                <th>Cost Price</th>
                                <th>Selling Price</th>
                                <th>Expiry Date</th>
                                <th>Status</th>
                                <th>Days Left</th>
                                <th class="owner-only">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="stockTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/inventory.js"></script>
</body>
</html>
