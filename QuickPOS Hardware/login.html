<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPOS | Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <span class="blue">Quick</span><span class="orange">POS</span>
        </div>
        
        <h2>Welcome Back</h2>
        <p class="subtitle">Please enter your credentials to continue</p>

        <div class="role-selector">
            <button id="cashierBtn" class="role-btn active" onclick="setRole('Cashier')">Cashier</button>
            <button id="ownerBtn" class="role-btn" onclick="setRole('Owner')">Owner</button>
        </div>

        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Username">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-login" id="loginBtn">Secure Login</button>

        <a href="#" class="forgot-password">Forgot Password?</a>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        let selectedRole = 'Cashier';

        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            const icon = type === 'success' 
                ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>'
                : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';

            toast.innerHTML = `
                <div class="toast-icon">${icon}</div>
                <div class="toast-message">${message}</div>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function setRole(role) {
            selectedRole = role;
            document.getElementById('cashierBtn').classList.toggle('active', role === 'Cashier');
            document.getElementById('ownerBtn').classList.toggle('active', role === 'Owner');
        }

        function handleEnterKey(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                document.getElementById('loginBtn').click();
            }
        }

        document.getElementById('username').addEventListener('keydown', handleEnterKey);
        document.getElementById('password').addEventListener('keydown', handleEnterKey);

        let isLoggingIn = false;

        document.getElementById('loginBtn').addEventListener('click', (event) => {
            event.preventDefault();
            if (isLoggingIn) return;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            isLoggingIn = true;
            const btn = document.getElementById('loginBtn');
            btn.innerText = 'Please Wait...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            // Send login attempt to main process
            ipcRenderer.send('login-attempt', { username, password, role: selectedRole });
        });

        // Listen for response from main process
        ipcRenderer.on('login-response', (event, response) => {
            isLoggingIn = false;
            const btn = document.getElementById('loginBtn');
            btn.innerText = 'Secure Login';
            btn.style.opacity = '1';
            btn.disabled = false;

            if (response.success) {
                showToast('Login Successful! Welcome Back, ' + response.user.full_name, 'success');
                // Here you would navigate to the dashboard
                // window.location.href = 'dashboard.html';
            } else {
                showToast(response.message, 'error');
            }
        });
    </script>
    
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
</body>
</html>
