<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPOS | Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <span class="blue">Quick</span><span class="orange">POS</span>
        </div>
        
        <h2>Welcome Back</h2>
        <p class="subtitle">Please enter your credentials to continue</p>

        <div class="role-selector">
            <button id="cashierBtn" class="role-btn active" onclick="setRole('Cashier')">Cashier</button>
            <button id="ownerBtn" class="role-btn" onclick="setRole('Owner')">Owner</button>
        </div>

        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Username">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-login" id="loginBtn">Secure Login</button>

        <div id="error-msg" style="color: #ef4444; margin-top: 1rem; font-size: 0.85rem; display: none;"></div>

        <a href="#" class="forgot-password">Forgot Password?</a>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        let selectedRole = 'Cashier';

        function setRole(role) {
            selectedRole = role;
            document.getElementById('cashierBtn').classList.toggle('active', role === 'Cashier');
            document.getElementById('ownerBtn').classList.toggle('active', role === 'Owner');
            document.getElementById('error-msg').style.display = 'none';
        }

        document.getElementById('loginBtn').addEventListener('click', () => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            if (!username || !password) {
                errorDiv.innerText = 'Please fill in all fields';
                errorDiv.style.display = 'block';
                return;
            }

            // Send login attempt to main process
            ipcRenderer.send('login-attempt', { username, password, role: selectedRole });
        });

        // Listen for response from main process
        ipcRenderer.on('login-response', (event, response) => {
            const errorDiv = document.getElementById('error-msg');
            if (response.success) {
                alert('Login Successful! Welcome Back, ' + response.user.full_name);
                // Here you would navigate to the dashboard
                // window.location.href = 'dashboard.html';
            } else {
                errorDiv.innerText = response.message;
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
