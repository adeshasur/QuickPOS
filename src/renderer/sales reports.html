  <div class="main-area">
    <div class="topbar">
      <button class="topbar-menu" id="menuBtn">
        <span class="icon lg"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></span>
      </button>
      <div class="topbar-title">Sales</div>
      <div class="topbar-shift">Shift: 08:00 â€“ 16:00</div>
      <div class="topbar-avatar">OP</div>
    </div>

    <div class="page-body">
      <!-- FILTERS -->
      <div class="filters-bar">
        <div class="filters-row">
          <!-- search -->
          <div class="search-wrap">
            <span class="search-icon icon sm"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input type="search" class="search-input" id="searchInput" placeholder="Search invoice or itemsâ€¦">
          </div>
          <!-- date quick tabs -->
          <div class="date-tabs">
            <button class="dtab active" data-d="today" onclick="setDateTab(this)">Today</button>
            <button class="dtab" data-d="week"  onclick="setDateTab(this)">This Week</button>
            <button class="dtab" data-d="month" onclick="setDateTab(this)">This Month</button>
            <button class="dtab" data-d="all"   onclick="setDateTab(this)">All</button>
          </div>
          <!-- payment filter -->
          <select class="pay-filter" id="payFilter" onchange="renderTable()">
            <option value="">All Payments</option>
            <option value="Cash">Cash</option>
            <option value="Bank">Bank / Card</option>
          </select>
        </div>
        <!-- summary -->
        <div class="summary-row" id="summaryRow"></div>
      </div>

      <!-- TABLE -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Invoice</th>
              <th class="hide-mob">Date &amp; Time</th>
              <th class="hide-mob">Items</th>
              <th>Payment</th>
              <th class="r">Total</th>
              <th class="r">Actions</th>
            </tr>
          </thead>
          <tbody id="salesBody"></tbody>
        </table>
        <div id="emptyState" style="display:none;" class="empty-state">
          <span class="icon xl" style="color:var(--border);"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
          <div style="font-size:15px;font-weight:700;">No sales found</div>
          <div style="font-size:13px;">Try adjusting your filters</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- RECEIPT MODAL -->
<div class="modal-bg" id="receiptModal">
  <div class="modal-box">
    <div class="modal-hdr">
      <span class="modal-ttl" id="receiptTitle">Receipt</span>
      <button class="modal-cls" onclick="closeReceipt()"><span class="icon"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span></button>
    </div>
    <div class="modal-body" id="receiptBody"></div>
    <div class="modal-ftr">
      <button class="mbtn close" onclick="closeReceipt()">Close</button>
      <button class="mbtn print" onclick="printReceipt()">
        <span class="icon sm"><svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></span>
        Print Receipt
      </button>
    </div>
  </div>
</div>

<!-- PRINT AREA -->
<div class="receipt-print" id="printArea"></div>

<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script src="js/common.js"></script>
    <script src="js/sales reports.js"></script>
</body>
</html>
