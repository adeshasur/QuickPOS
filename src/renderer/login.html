<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPOS Login</title>
    <link rel="stylesheet" href="../styles/common.css">
    
    <link rel="stylesheet" href="../styles/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand-header">
                <h1 class="brand-title">
                    <span class="quick">Quick</span><span class="pos">POS</span><span class="quick"> Hardware</span>
                </h1>
                <p class="brand-subtitle">by Fides.M</p>
            </div>
            
            <div class="error-message" id="errorMessage">
                <span>âš ï¸</span> Invalid username or password
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <input type="text" id="username" class="form-input" placeholder="Enter your username" required autofocus>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" id="passwordToggle">ðŸ‘ï¸</button>
                    </div>
                </div>
                
                <!-- Quick fill buttons for demo -->
                <div class="quick-fill">
                    <button type="button" class="quick-btn owner" id="quickAdminBtn">
                        Use Owner Account
                    </button>
                    <button type="button" class="quick-btn cashier" id="quickStaffBtn">
                        Use Cashier Account
                    </button>
                </div>
                
                <button type="submit" class="login-button" id="loginBtn">
                    <span>Login</span>
                    <div class="loading" id="loadingSpinner"></div>
                </button>
            </form>
            
            <div class="demo-credentials">
                <div class="demo-title">
                    <span>ðŸ”</span> Demo Accounts
                </div>
                <div class="demo-account">
                    <div class="demo-info">
                        <strong>admin</strong> / 123
                    </div>
                    <div class="demo-role owner">Owner</div>
                </div>
                <div class="demo-account">
                    <div class="demo-info">
                        <strong>staff</strong> / 456
                    </div>
                    <div class="demo-role cashier">Cashier</div>
                </div>
            </div>
            
            <div class="footer-note">
                Offline-first desktop POS system for Windows PCs â€¢
                <a href="#" class="footer-link" id="forgotPassword">Forgot Password?</a>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
