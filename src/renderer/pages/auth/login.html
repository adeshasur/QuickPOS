<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPOS - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #000080;
            --primary-orange: #FF8C00;
            --bg-light: #F8F9FA;
            --text-dark: #2D3436;
            --text-gray: #636E72;
            --border-light: #E0E0E0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
        }

        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 460px;
            padding: 50px 44px;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-orange));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px rgba(0, 0, 128, .2);
        }
        .logo-icon svg { width: 24px; height: 24px; stroke: #fff; fill: none; stroke-width: 2; }
        .logo-text .blue { color: var(--primary-blue); }
        .logo-text .orange { color: var(--primary-orange); }

        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #1e293b; }
        .subheading { font-size: 14px; color: var(--text-gray); margin-bottom: 32px; }

        .role-selector {
            display: flex;
            background: #F1F3F5;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 32px;
        }
        .role-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-gray);
        }
        .role-btn.active {
            background: var(--primary-blue);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(0, 0, 128, 0.2);
        }

        .input-group { text-align: left; margin-bottom: 24px; }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-gray);
            margin-bottom: 8px;
        }
        .input {
            width: 100%;
            padding: 14px 16px;
            background: #F8F9FA;
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input:focus { border-color: var(--primary-blue); }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--primary-orange);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-login:hover { background: #E67E00; }
        .btn-login:active { transform: scale(0.98); }

        .forgot-password {
            display: block;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-gray);
            text-decoration: none;
            font-weight: 500;
        }
        .forgot-password:hover { text-decoration: underline; }

        .toast-container { 
            position: fixed; 
            top: 24px; 
            right: 24px; 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            pointer-events: none;
        }
        .toast {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transform: translateX(120%);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 15px;
            font-weight: 600;
            min-width: 280px;
            border: 1px solid rgba(0,0,0,0.05);
            pointer-events: auto;
        }
        .toast.show { transform: translateX(0); }
        
        .toast-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .toast-error { border-left: 5px solid #ff4757; }
        .toast-error .toast-icon { background: rgba(255, 71, 87, 0.1); color: #ff4757; }
        
        .toast-success { border-left: 5px solid #2ed573; }
        .toast-success .toast-icon { background: rgba(46, 213, 115, 0.1); color: #2ed573; }

        @keyframes progress {
            from { width: 100%; }
            to { width: 0%; }
        }
        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: rgba(0,0,0,0.05);
            width: 100%;
            border-radius: 0 0 0 16px;
        }
        .toast.show .toast-progress::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            height: 100%;
            background: inherit;
            animation: progress 3s linear forwards;
        }
        .toast-success .toast-progress::after { background: #2ed573; }
        .toast-error .toast-progress::after { background: #ff4757; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><span class="blue">Quick</span><span class="orange">POS</span></div>
        <h1>Welcome Back</h1>
        <p class="subheading">Please enter your credentials to continue</p>
        
        <div class="role-selector">
            <button id="cashierBtn" class="role-btn active" onclick="setRole('Cashier')">Cashier</button>
            <button id="ownerBtn" class="role-btn" onclick="setRole('Owner')">Owner</button>
        </div>

        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" class="input" placeholder="Username" autocomplete="username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" class="input" placeholder="********" autocomplete="current-password">
        </div>

        <button class="btn-login" id="loginBtn">Secure Login</button>
        
        <a href="#" class="forgot-password">Forgot Password?</a>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        const { ipcRenderer } = require('electron');
        let selectedRole = 'Cashier';

        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'success' ? 'toast-success' : 'toast-error'}`;
            
            const icon = type === 'success' ? 'âœ“' : 'âœ•';
            
            toast.innerHTML = `
                <div class="toast-icon">${icon}</div>
                <div class="toast-content">${message}</div>
                <div class="toast-progress"></div>
            `;
            
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            
            setTimeout(() => { 
                toast.classList.remove('show'); 
                setTimeout(() => toast.remove(), 500); 
            }, 3000);
        }

        function setRole(role) {
            selectedRole = role;
            document.getElementById('cashierBtn').classList.toggle('active', role === 'Cashier');
            document.getElementById('ownerBtn').classList.toggle('active', role === 'Owner');
        }

        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) { showToast('Please fill in all fields'); return; }
            
            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerText;
            btn.innerText = 'Verifying...'; 
            btn.disabled = true;
            
            ipcRenderer.send('login-attempt', { username, password, role: selectedRole });
        });

        ipcRenderer.on('login-response', (event, response) => {
            const btn = document.getElementById('loginBtn');
            
            if (response.success) {
                showToast('Login Successful! Redirecting...', 'success');
                localStorage.setItem('quickpos-user', JSON.stringify(response.user));
                
                // Delay redirect to allow toast to be seen
                setTimeout(() => {
                    window.location.href = '../dashboard/dashboard.html';
                }, 1500);
            } else { 
                btn.innerText = 'Secure Login'; 
                btn.disabled = false;
                showToast(response.message || 'Login Failed', 'error'); 
            }
        });
    </script>
</body>
</html>
