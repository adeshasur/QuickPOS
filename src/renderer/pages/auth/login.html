<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPOS Pro — Access Portal</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { align-items: center; justify-content: center; position: relative; }
        body::before { content: ''; position: absolute; width: 400px; height: 400px; background: var(--accent); filter: blur(150px); opacity: 0.15; top: -100px; right: -100px; z-index: -1; }
        .login-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(20px); border: 1px solid var(--border); width: 100%; max-width: 420px; padding: 48px; border-radius: 28px; text-align: center; }
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 32px; letter-spacing: -0.03em; }
        .logo .blue { color: var(--accent2); }
        .role-selector { display: flex; background: var(--surface2); padding: 4px; border-radius: 14px; margin-bottom: 24px; border: 1px solid var(--border); }
        .role-btn { flex: 1; padding: 10px; border: none; background: transparent; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--text2); }
        .role-btn.active { background: var(--accent); color: #fff; box-shadow: 0 4px 12px var(--accent-glow); }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.05em; }
        .btn-login { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; }
        .toast { background: var(--surface); border: 1px solid var(--border); padding: 16px 24px; border-radius: 16px; transform: translateX(120%); transition: transform 0.4s; display: flex; align-items: center; gap: 12px; }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><span class="blue">Quick</span>POS</div>
        <h2>System Login</h2>
        <p class="tb-sub" style="margin-bottom:32px">Access your retail management suite</p>
        <div class="role-selector">
            <button id="cashierBtn" class="role-btn active" onclick="setRole('Cashier')">Cashier</button>
            <button id="ownerBtn" class="role-btn" onclick="setRole('Owner')">Owner</button>
        </div>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" class="input" style="width:100%" placeholder="e.g. admin" autocomplete="username">
        </div>
        <div class="input-group">
            <label>Security Password</label>
            <input type="password" id="password" class="input" style="width:100%" placeholder="Enter your password" autocomplete="current-password">
        </div>
        <button class="btn-login" id="loginBtn">Authorize Access</button>
        <a href="#" class="tb-sub" style="display:block; margin-top:24px; text-decoration:none">Need help accessing? Contact Administrator</a>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script>
        const { ipcRenderer } = require('electron');
        let selectedRole = 'Cashier';

        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${type === 'success' ? '✓' : '✗'}</span> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3000);
        }

        function setRole(role) {
            selectedRole = role;
            document.getElementById('cashierBtn').classList.toggle('active', role === 'Cashier');
            document.getElementById('ownerBtn').classList.toggle('active', role === 'Owner');
        }

        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });

        document.getElementById('loginBtn').addEventListener('click', () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) { showToast('Please fill in all fields'); return; }
            const btn = document.getElementById('loginBtn');
            btn.innerText = 'Verifying...'; btn.disabled = true;
            ipcRenderer.send('login-attempt', { username, password, role: selectedRole });
        });

        ipcRenderer.on('login-response', (event, response) => {
            const btn = document.getElementById('loginBtn');
            btn.innerText = 'Authorize Access'; btn.disabled = false;
            if (response.success) {
                localStorage.setItem('quickpos-user', JSON.stringify(response.user));
                window.location.href = '../dashboard/dashboard.html';
            } else { showToast(response.message); }
        });
    </script>
</body>
</html>
