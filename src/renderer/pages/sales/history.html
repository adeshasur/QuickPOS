<div class="main">
  <div class="topbar">
    <div class="tb-title">Sales History</div>
    <div class="tb-right"><span class="tb-sub" id="sysTime">...</span><div class="avatar" id="av">AD</div></div>
  </div>

  <div class="content">
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Invoice</th>
              <th>Customer</th>
              <th>Cashier</th>
              <th>Date</th>
              <th>Payment</th>
              <th style="text-align:right">Amount</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="historyTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="../../assets/js/core.js"></script>
<script>
const { ipcRenderer } = require('electron');

async function loadSales() {
    try {
        const sales = await ipcRenderer.invoke('get-sales-history');
        render(sales);
    } catch (err) {
        window.showToast('Failed to load sales history', 'error');
    }
}

function render(sales) {
    const tbody = document.getElementById('historyTableBody');
    
    if (sales.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text3)">No sales found</td></tr>';
        return;
    }
    
    tbody.innerHTML = sales.map(s => `
        <tr>
            <td style="font-family:var(--mono); font-weight:600">${s.invoice_no}</td>
            <td>${s.customer_name || 'Walking Customer'}</td>
            <td>${s.username || 'â€”'}</td>
            <td>${new Date(s.created_at).toLocaleString()}</td>
            <td><span class="badge badge-unit">${s.payment_method}</span></td>
            <td style="text-align:right;font-weight:700">${window.formatCurrency(s.total)}</td>
            <td><span class="badge badge-green">${s.status}</span></td>
        </tr>
    `).join('');
}

loadSales();
</script>
