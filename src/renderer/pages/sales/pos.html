<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickPOS Pro - Point of Sale</title>
<link rel="stylesheet" href="../../assets/css/global.css">
<link rel="stylesheet" href="../../assets/css/components.css">
<link rel="stylesheet" href="../../assets/css/sidebar.css">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
/* POS Structural Layout */
.pos-layout { 
    display: grid; 
    grid-template-columns: 1fr 380px; 
    gap: 0; 
    height: calc(100vh - 64px); 
    overflow: hidden; 
}

/* Left: Catalog Area */
.catalog-area { 
    padding: 24px; 
    background: var(--bg); 
    display: flex; 
    flex-direction: column; 
    gap: 20px; 
    overflow-y: auto; 
    border-right: 1px solid var(--border);
}

.search-container { position: relative; }
.search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text3); }
.search-bar { 
    padding: 14px 16px 14px 44px; 
    width: 100%; 
    background: var(--surface); 
    border: 1px solid var(--border); 
    border-radius: 12px; 
    font-size: 15px; 
    outline: none;
    box-shadow: var(--shadow-sm);
}

.category-tabs { 
    display: flex; 
    gap: 10px; 
    overflow-x: auto; 
    padding-bottom: 4px; 
    scrollbar-width: none; 
}
.category-tabs::-webkit-scrollbar { display: none; }
.cat-tab { 
    padding: 8px 18px; 
    background: var(--surface); 
    border: 1px solid var(--border); 
    border-radius: 10px; 
    font-size: 13px; 
    font-weight: 600; 
    cursor: pointer; 
    white-space: nowrap;
    transition: all 0.2s;
}
.cat-tab.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }

.product-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
    gap: 16px; 
}

/* Product Card Redesign */
.prod-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 160px;
}
.prod-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--accent); }
.prod-cat { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
.prod-edit { position: absolute; top: 12px; right: 12px; color: var(--text3); font-size: 14px; opacity: 0.5; }
.prod-name { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
.prod-price { font-size: 20px; font-weight: 800; color: var(--green); }
.prod-stock-pill { 
    position: absolute; bottom: 16px; right: 16px; 
    background: var(--surface2); padding: 4px 10px; 
    border-radius: 8px; font-size: 11px; font-weight: 700; color: var(--text2); 
}
.prod-card.out-of-stock { opacity: 0.6; filter: grayscale(1); cursor: not-allowed; }

/* Right: Cart Area */
.cart-area { 
    background: var(--surface); 
    display: flex; 
    flex-direction: column; 
    overflow: hidden; 
}
.cart-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.cart-title { font-size: 18px; font-weight: 700; }
.items-badge { background: var(--accent2); color: #fff; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; }

.customer-selector { padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--bg); }
.cust-search { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; }

.cart-items { flex: 1; overflow-y: auto; padding: 20px; }
.cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px dashed var(--border); }
.item-info { flex: 1; }
.item-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.item-price { font-size: 12px; color: var(--text2); }
.item-total { font-weight: 800; font-family: var(--mono); color: var(--text); min-width: 80px; text-align: right; }

.cart-footer { padding: 24px; background: var(--bg); border-top: 1px solid var(--border); }
.total-display { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.total-label { font-size: 16px; font-weight: 600; color: var(--text2); }
.total-val { font-size: 28px; font-weight: 800; color: var(--green); }

.payment-methods { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.pay-btn { 
    display: flex; flex-direction: column; align-items: center; gap: 8px; 
    padding: 16px; border: 2px solid var(--border); border-radius: 12px; 
    background: var(--surface); cursor: pointer; transition: all 0.2s; 
}
.pay-btn:hover { border-color: var(--accent2); background: var(--accent-light); }
.pay-btn.active { border-color: var(--accent2); background: var(--accent2); color: #fff; }
.pay-btn svg { width: 24px; height: 24px; }
.pay-label { font-size: 11px; font-weight: 700; text-transform: uppercase; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
</style>
</head>
<body>

  <div class="sb-top">

    <span class="sb-logo-text">QuickPOS Pro</span>
    <button class="sb-toggle" id="hamburgerBtn"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  </div>
  <div class="sb-nav">
    <div class="sb-section-label">MAIN</div>
    <a href="../dashboard/dashboard.html" class="nav-item"><span class="ni"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></span><span class="nt">Dashboard</span></a>
    <a href="pos.html" class="nav-item active"><span class="ni"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg></span><span class="nt">Make a Sale</span></a>
    
    <div class="sb-section-label">INVENTORY</div>
    <a href="../inventory/products.html" class="nav-item"><span class="ni"><svg viewBox="0 0 24 24"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg></span><span class="nt">Products</span></a>
    <a href="../inventory/categories.html" class="nav-item"><span class="ni"><svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/></svg></span><span class="nt">Categories</span></a>
    <a href="../inventory/stock.html" class="nav-item"><span class="ni"><svg viewBox="0 0 24 24"><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg></span><span class="nt">Stock Control</span></a>

    <div class="sb-section-label">PEOPLE</div>
    <a href="../people/customers.html" class="nav-item"><span class="ni"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span class="nt">Customers</span></a>
    <a href="../people/users.html" class="nav-item owner-only"><span class="ni"><svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/></svg></span><span class="nt">Staff</span></a>

    <div class="sb-section-label">ANALYTICS</div>
    <a href="../analytics/reports.html" class="nav-item"><span class="ni"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg></span><span class="nt">Reports</span></a>
    <a href="history.html" class="nav-item"><span class="ni"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/></svg></span><span class="nt">Sales History</span></a>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <div class="tb-title">Make a Sale</div>
    <div class="tb-right">
        <span class="tb-sub" id="cashierName">Cashier: Loading...</span>
        <div class="avatar" id="av">JD</div>
    </div>
  </div>

  <div class="pos-layout">
    <!-- Left: Catalog -->
    <div class="catalog-area">
      <div class="search-container">
        <div class="search-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
        <input type="text" class="search-bar" id="pSearch" placeholder="Quick stock search...">
      </div>

      <div class="category-tabs" id="categoryTabs">
        <button class="cat-tab active" onclick="filterByCategory('')">All</button>
        <!-- Categories will be injected here -->
      </div>

      <div class="product-grid" id="productGrid">
        <!-- Products will be injected here -->
      </div>
    </div>

    <!-- Right: Cart -->
    <div class="cart-area">
      <div class="cart-header">
        <div class="cart-title">Current Sale</div>
        <div class="items-badge" id="cartCountBadge">Items: 0</div>
      </div>

      <div class="customer-selector">
        <input type="text" class="cust-search" placeholder="Search customer by name or phone..">
      </div>

      <div class="cart-items" id="cartItems">
        <div class="empty-state">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="margin-bottom:16px; opacity:0.2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            <p>Cart is empty</p>
            <small>Tap a product to add</small>
        </div>
      </div>

      <div class="cart-footer">
        <div class="total-display">
            <span class="total-label">Total</span>
            <span class="total-val" id="grandTotal">LKR 0.00</span>
        </div>

        <div class="payment-methods">
            <button class="pay-btn active" id="payCash" onclick="setPayment('Cash')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                <span class="pay-label">Cash</span>
            </button>
            <button class="pay-btn" id="payCard" onclick="setPayment('Card')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                <span class="pay-label">Card</span>
            </button>
            <button class="pay-btn" id="payCredit" onclick="setPayment('Credit')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="pay-label">Credit</span>
            </button>
        </div>

        <button class="btn btn-primary" style="width:100%; height:60px; font-size:18px; margin-top:20px; border-radius:16px" id="checkoutBtn">Complete Sale</button>
      </div>
    </div>
  </div>
</div>

<script src="../../assets/js/core.js"></script>
<script>
const { ipcRenderer } = require('electron');
let products = [];
let categories = [];
let cart = [];
let currentCategory = '';
let paymentMethod = 'Cash';

async function init() {
    const user = JSON.parse(localStorage.getItem('quickpos-user'));
    if (user) {
        document.getElementById('cashierName').textContent = `Cashier: ${user.full_name || user.username}`;
        document.getElementById('av').textContent = (user.full_name || user.username).substring(0, 2).toUpperCase();
    }
    
    try {
        products = await ipcRenderer.invoke('get-all-products');
        categories = await ipcRenderer.invoke('get-all-categories');
        renderCategories();
        renderProducts();
    } catch (err) {
        console.error('Init failed:', err);
    }
}

function renderCategories() {
    const tabs = document.getElementById('categoryTabs');
    tabs.innerHTML = `<button class="cat-tab ${currentCategory === '' ? 'active' : ''}" onclick="filterByCategory('')">All</button>` + 
        categories.map(c => `<button class="cat-tab ${currentCategory == c.id ? 'active' : ''}" onclick="filterByCategory(${c.id})">${c.name}</button>`).join('');
}

function filterByCategory(catId) {
    currentCategory = catId;
    renderCategories();
    renderProducts(document.getElementById('pSearch').value);
}

function renderProducts(filter = '') {
    const grid = document.getElementById('productGrid');
    let filtered = products;
    
    if (currentCategory) filtered = filtered.filter(p => p.category_id == currentCategory);
    if (filter) filtered = filtered.filter(p => 
        p.name.toLowerCase().includes(filter.toLowerCase()) || 
        (p.sku && p.sku.toLowerCase().includes(filter.toLowerCase()))
    );
    
    grid.innerHTML = filtered.map(p => `
        <div class="prod-card ${p.current_stock <= 0 ? 'out-of-stock' : ''}" onclick="addToCart(${p.id})">
            <div class="prod-cat">${p.category_name || 'General'}</div>
            <div class="prod-edit">✎</div>
            <div class="prod-name">${p.name}</div>
            <div class="prod-price">${window.formatCurrency(p.sale_price || p.base_price)}</div>
            <div class="prod-stock-pill">${p.current_stock} ${p.is_weighted ? 'kg' : 'pcs'}</div>
        </div>
    `).join('');
}

document.getElementById('pSearch').addEventListener('input', (e) => renderProducts(e.target.value));

function addToCart(id) {
    const p = products.find(x => x.id === id);
    if (!p || p.current_stock <= 0) return;
    
    const existing = cart.find(x => x.id === id);
    if (existing) {
        if (existing.qty < p.current_stock) { existing.qty++; }
        else { window.showToast('Maximum stock reached', 'error'); return; }
    } else {
        cart.push({ id: p.id, name: p.name, price: p.sale_price || p.base_price, qty: 1 });
    }
    updateCartUI();
}

function setPayment(method) {
    paymentMethod = method;
    document.getElementById('payCash').classList.toggle('active', method === 'Cash');
    document.getElementById('payCard').classList.toggle('active', method === 'Card');
    document.getElementById('payCredit').classList.toggle('active', method === 'Credit');
}

function updateCartUI() {
    const items = document.getElementById('cartItems');
    const badge = document.getElementById('cartCountBadge');
    
    badge.textContent = `Items: ${cart.reduce((s, i) => s + i.qty, 0)}`;
    
    if (cart.length === 0) {
        items.innerHTML = `<div class="empty-state">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="margin-bottom:16px; opacity:0.2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            <p>Cart is empty</p>
            <small>Tap a product to add</small>
        </div>`;
    } else {
        items.innerHTML = cart.map(c => `
            <div class="cart-item">
                <div class="item-info">
                    <div class="item-name">${c.name}</div>
                    <div class="item-price">${c.qty} x ${window.formatCurrency(c.price)}</div>
                </div>
                <div class="item-total">${window.formatCurrency(c.price * c.qty)}</div>
            </div>
        `).join('');
    }
    
    const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
    document.getElementById('grandTotal').textContent = window.formatCurrency(total);
}

document.getElementById('checkoutBtn').onclick = async () => {
    if (cart.length === 0) { window.showToast('Cart is empty', 'error'); return; }
    
    const user = JSON.parse(localStorage.getItem('quickpos-user'));
    const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
    
    const saleData = {
        customer_id: null,
        user_id: user ? user.id : null,
        subtotal: total,
        discount: 0,
        tax: 0,
        total: total,
        payment_method: paymentMethod,
        items: cart.map(item => ({
            product_id: item.id,
            quantity: item.qty,
            unit_price: item.price,
            total: item.price * item.qty
        }))
    };
    
    try {
        const result = await ipcRenderer.invoke('complete-sale', saleData);
        window.showToast(`Success! Invoice: ${result.invoice_no}`, 'success');
        cart = [];
        updateCartUI();
        await init();
    } catch (err) {
        window.showToast('Transaction failed', 'error');
    }
};

init();
</script>
</body>
</html>
