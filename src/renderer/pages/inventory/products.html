  border: 1px solid var(--border); background: var(--surface);
  cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
  transition: all .2s; color: var(--text2);
}
.action-btn:hover { background: var(--surface2); color: var(--text); transform: scale(1.05); }
.action-btn.edit:hover { border-color: var(--accent); color: var(--accent); }
.action-btn.delete:hover { border-color: var(--red); color: var(--red); }
</style>

<div class="main">
  <div class="topbar">
    <div class="tb-title">Products</div>
    <div class="tb-right"><span class="tb-sub" id="sysTime">...</span><div class="avatar" id="av">AD</div></div>
  </div>

  <div class="content">
    <div style="display:flex; justify-content:space-between; align-items:center">
      <div>
        <h2 class="page-heading">Product Catalog</h2>
        <p class="tb-sub">Manage items and pricing</p>
      </div>
      <button class="btn btn-primary" id="addProductBtn">+ Add New Product</button>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>SKU</th>
              <th>Category</th>
              <th>Type</th>
              <th>Stock</th>
              <th style="text-align:right">Price</th>
              <th style="text-align:right">Actions</th>
            </tr>
          </thead>
          <tbody id="productsTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="productModal">
  <div class="modal-box">
    <div class="modal-head"><h3 id="modalTitle">Add Product</h3><button onclick="closeModal('productModal')" class="tb-sub" style="background:none; border:none; cursor:pointer;font-size:18px">âœ•</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="label">Product Name</label><input type="text" id="pName" class="input"></div>
      <div class="form-group"><label class="label">SKU</label><input type="text" id="pSku" class="input"></div>
      <div class="form-group"><label class="label">Category</label><select id="pCat" class="select"></select></div>
      <div class="form-row">
        <div class="form-group"><label class="label">Cost Price</label><input type="number" id="pCost" class="input"></div>
        <div class="form-group"><label class="label">Sale Price</label><input type="number" id="pPrice" class="input"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="label">Stock</label><input type="number" id="pStock" class="input"></div>
        <div class="form-group"><label class="label">Alert Level</label><input type="number" id="pAlert" class="input" value="10"></div>
      </div>
      <div class="form-group"><label class="label">Description</label><textarea id="pDesc" class="textarea"></textarea></div>
      <div class="form-group"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="pWeighted"> Weighted Product</label></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal('productModal')">Cancel</button>
      <button class="btn btn-primary" id="saveProductBtn">Save Product</button>
    </div>
  </div>
</div>

<script src="../../assets/js/core.js"></script>
<script>
const { ipcRenderer } = require('electron');
let products = [];
let categories = [];
let editingId = null;

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function loadData() {
    try {
        products = await ipcRenderer.invoke('get-all-products');
        categories = await ipcRenderer.invoke('get-all-categories');
        render();
        populateCategories();
    } catch (err) {
        console.error('Failed to load data:', err);
        window.showToast('Failed to load data', 'error');
    }
}

function render() {
    const tbody = document.getElementById('productsTableBody');
    tbody.innerHTML = products.map(p => `
        <tr>
            <td class="td-name">${p.name}</td>
            <td style="font-family:var(--mono);font-size:12px">${p.sku || 'â€”'}</td>
            <td>${p.category_name || 'â€”'}</td>
            <td><span class="badge ${p.is_weighted ? 'badge-weight' : 'badge-unit'}">${p.is_weighted ? 'Weighted' : 'Unit'}</span></td>
            <td><span class="badge ${p.current_stock <= p.alert_level ? 'badge-red' : 'badge-green'}">${p.current_stock}</span></td>
            <td style="text-align:right"><div class="price-final">${window.formatCurrency(p.sale_price || p.base_price)}</div></td>
            <td style="text-align:right">
                <button class="btn btn-secondary" style="padding:5px 10px; font-size:11px" onclick="editProduct(${p.id})">Edit</button>
                <button class="btn btn-danger" style="padding:5px 10px; font-size:11px" onclick="deleteProduct(${p.id})">Delete</button>
            </td>
        </tr>
    `).join('');
}

function populateCategories() {
    const sel = document.getElementById('pCat');
    sel.innerHTML = '<option value="">Select Category</option>' + categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

document.getElementById('addProductBtn').onclick = () => {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'Add Product';
    document.getElementById('pName').value = '';
    document.getElementById('pSku').value = '';
    document.getElementById('pCat').value = '';
    document.getElementById('pCost').value = '';
    document.getElementById('pPrice').value = '';
    document.getElementById('pStock').value = '';
    document.getElementById('pAlert').value = '10';
    document.getElementById('pDesc').value = '';
    document.getElementById('pWeighted').checked = false;
    openModal('productModal');
};

async function editProduct(id) {
    try {
        const p = await ipcRenderer.invoke('get-product', id);
        if (!p) return;
        
        editingId = id;
        document.getElementById('modalTitle').textContent = 'Edit Product';
        document.getElementById('pName').value = p.name;
        document.getElementById('pSku').value = p.sku || '';
        document.getElementById('pCat').value = p.category_id || '';
        document.getElementById('pCost').value = p.cost_price;
        document.getElementById('pPrice').value = p.sale_price || p.base_price;
        document.getElementById('pStock').value = p.current_stock;
        document.getElementById('pAlert').value = p.alert_level;
        document.getElementById('pDesc').value = p.description || '';
        document.getElementById('pWeighted').checked = !!p.is_weighted;
        openModal('productModal');
    } catch (err) {
        window.showToast('Failed to load product', 'error');
    }
}

async function deleteProduct(id) {
    if (!await window.confirmAction('Delete this product?')) return;
    try {
        await ipcRenderer.invoke('delete-product', id);
        window.showToast('Product deleted');
        await loadData();
    } catch (err) {
        window.showToast('Failed to delete product', 'error');
    }
}

document.getElementById('saveProductBtn').onclick = async () => {
    const name = document.getElementById('pName').value.trim();
    const sku = document.getElementById('pSku').value.trim();
    const category_id = document.getElementById('pCat').value || null;
    const cost_price = parseFloat(document.getElementById('pCost').value) || 0;
    const sale_price = parseFloat(document.getElementById('pPrice').value) || 0;
    const current_stock = parseInt(document.getElementById('pStock').value) || 0;
    const alert_level = parseInt(document.getElementById('pAlert').value) || 10;
    const description = document.getElementById('pDesc').value.trim();
    const is_weighted = document.getElementById('pWeighted').checked;
    
    if (!name) { window.showToast('Product name is required', 'error'); return; }
    
    const product = { name, sku, category_id, base_price: sale_price, sale_price, cost_price, current_stock, alert_level, is_weighted, description };
    
    try {
        if (editingId) {
            product.id = editingId;
            await ipcRenderer.invoke('update-product', product);
            window.showToast('Product updated');
        } else {
            await ipcRenderer.invoke('add-product', product);
            window.showToast('Product added');
        }
        closeModal('productModal');
        await loadData();
    } catch (err) {
        window.showToast('Failed to save product', 'error');
    }
};

loadData();
</script>
</body>
