<div class="modal-overlay" id="userModal">
  <div class="modal-box">
    <div class="modal-head"><h3 id="userModalTitle">Add Staff Member</h3><button onclick="closeModal('userModal')" class="tb-sub" style="background:none; border:none; cursor:pointer;font-size:18px">âœ•</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="label">Username</label><input type="text" id="uUsername" class="input"></div>
      <div class="form-group"><label class="label">Full Name</label><input type="text" id="uName" class="input"></div>
      <div class="form-group"><label class="label">Password</label><input type="password" id="uPassword" class="input"></div>
      <div class="form-group"><label class="label">Role</label><select id="uRole" class="select"><option value="Cashier">Cashier</option><option value="Owner">Owner</option></select></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal('userModal')">Cancel</button>
      <button class="btn btn-primary" id="saveUserBtn">Save</button>
    </div>
  </div>

<script src="../../assets/js/core.js"></script>
<script>
const { ipcRenderer } = require('electron');
let users = [];
let editingId = null;

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function loadUsers() {
    try {
        const result = await new Promise((resolve, reject) => {
            const { db } = require('../../database/db');
            db.all("SELECT id, username, full_name, role, created_at FROM users ORDER BY username", [], (err, rows) => {
                if (err) reject(err);
                else resolve(rows);
            });
        });
        users = result;
        render();
    } catch (err) {
        window.showToast('Failed to load users', 'error');
    }
}

function render() {
    const tbody = document.getElementById('usersTableBody');
    tbody.innerHTML = users.map(u => `
        <tr>
            <td style="font-weight:600">${u.username}</td>
            <td>${u.full_name || 'â€”'}</td>
            <td><span class="badge ${u.role === 'Owner' ? 'badge-amber' : 'badge-unit'}">${u.role}</span></td>
            <td class="tb-sub">${new Date(u.created_at).toLocaleDateString()}</td>
            <td style="text-align:right">
                <button class="btn btn-secondary" style="padding:5px 10px; font-size:11px" onclick="editUser(${u.id})">Edit</button>
                <button class="btn btn-danger" style="padding:5px 10px; font-size:11px" onclick="deleteUser(${u.id})">Delete</button>
            </td>
        </tr>
    `).join('');
}

document.getElementById('addUserBtn').onclick = () => {
    editingId = null;
    document.getElementById('userModalTitle').textContent = 'Add Staff Member';
    document.getElementById('uUsername').value = '';
    document.getElementById('uName').value = '';
    document.getElementById('uPassword').value = '';
    document.getElementById('uRole').value = 'Cashier';
    openModal('userModal');
};

async function editUser(id) {
    const u = users.find(x => x.id === id);
    if (!u) return;
    editingId = id;
    document.getElementById('userModalTitle').textContent = 'Edit Staff Member';
    document.getElementById('uUsername').value = u.username;
    document.getElementById('uName').value = u.full_name || '';
    document.getElementById('uPassword').value = '';
    document.getElementById('uRole').value = u.role;
    openModal('userModal');
}

async function deleteUser(id) {
    const user = JSON.parse(localStorage.getItem('quickpos-user'));
    if (user && user.id === id) {
        window.showToast('Cannot delete your own account', 'error');
        return;
    }
    if (!await window.confirmAction('Delete this user?')) return;
    try {
        const { db } = require('../../database/db');
        await new Promise((resolve, reject) => {
            db.run("DELETE FROM users WHERE id = ?", [id], function(err) {
                if (err) reject(err);
                else resolve(this.changes);
            });
        });
        window.showToast('User deleted');
        await loadUsers();
    } catch (err) {
        window.showToast('Failed to delete user', 'error');
    }
}

document.getElementById('saveUserBtn').onclick = async () => {
    const username = document.getElementById('uUsername').value.trim();
    const full_name = document.getElementById('uName').value.trim();
    const password = document.getElementById('uPassword').value;
    const role = document.getElementById('uRole').value;
    
    if (!username) { window.showToast('Username is required', 'error'); return; }
    if (!password && !editingId) { window.showToast('Password is required', 'error'); return; }
    
    try {
        const { db } = require('../../database/db');
        if (editingId) {
            if (password) {
                await new Promise((resolve, reject) => {
                    db.run("UPDATE users SET username=?, full_name=?, password=?, role=? WHERE id=?", [username, full_name, password, role, editingId], function(err) {
                        if (err) reject(err);
                        else resolve(this.changes);
                    });
                });
            } else {
                await new Promise((resolve, reject) => {
                    db.run("UPDATE users SET username=?, full_name=?, role=? WHERE id=?", [username, full_name, role, editingId], function(err) {
                        if (err) reject(err);
                        else resolve(this.changes);
                    });
                });
            }
            window.showToast('User updated');
        } else {
            await new Promise((resolve, reject) => {
                db.run("INSERT INTO users (username, full_name, password, role) VALUES (?, ?, ?, ?)", [username, full_name, password, role], function(err) {
                    if (err) reject(err);
                    else resolve(this.lastID);
                });
            });
            window.showToast('User added');
        }
        closeModal('userModal');
        await loadUsers();
    } catch (err) {
        if (err.message && err.message.includes('UNIQUE constraint')) {
            window.showToast('Username already exists', 'error');
        } else {
            window.showToast('Failed to save user', 'error');
        }
    }
};

loadUsers();
</script>
