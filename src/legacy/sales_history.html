<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickPOS Pro — Sales History</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sidebar.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0B0F19;
  --surface: #111827;
  --surface2: #1A2235;
  --surface3: #1F2B3E;
  --border: #1E2D45;
  --border2: #263548;
  --accent: #3B82F6;
  --accent2: #60A5FA;
  --accent-glow: rgba(59, 130, 246, .18);
  --green: #10B981;
  --green-dim: rgba(16, 185, 129, .12);
  --amber: #F59E0B;
  --amber-dim: rgba(245, 158, 11, .12);
  --red: #EF4444;
  --red-dim: rgba(239, 68, 68, .1);
  --purple: #8B5CF6;
  --cyan: #06B6D4;
  --text: #E2E8F0;
  --text2: #94A3B8;
  --text3: #475569;
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
  --r: 10px;
  --r2: 14px;
}

body {
  background: var(--bg);
  font-family: var(--font);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
  font-size: 14px;
}

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.topbar {
  height: 62px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 22px;
  flex-shrink: 0;
}
.tb-title { font-size: 16px; font-weight: 600; color: var(--text); }
.tb-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.tb-sub { font-size: 13px; color: var(--text2); }
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: #fff;
}

.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 20px; gap: 16px; }

/* Filter Bar */
.filter-bar {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r2);
  padding: 16px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  padding: 10px 14px 10px 38px; border-radius: 10px; color: var(--text);
  font-size: 13px; outline: none; transition: all .2s;
}
.search-wrap input:focus { border-color: var(--accent); background: var(--surface3); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); }

.date-tabs { display: flex; background: var(--surface2); padding: 4px; border-radius: 10px; }
.tab-btn {
  padding: 6px 14px; border: none; border-radius: 7px; background: transparent;
  color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s;
}
.tab-btn.active { background: var(--surface3); color: var(--accent2); box-shadow: 0 2px 6px rgba(0,0,0,.2); }

.select-filter {
  background: var(--surface2); border: 1px solid var(--border2);
  padding: 10px 14px; border-radius: 10px; color: var(--text); font-size: 13px; outline: none; cursor: pointer;
}

/* Stats Row in Filters */
.summary-row { display: flex; gap: 12px; margin-top: 4px; }
.sum-pill {
  padding: 4px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; font-size: 11px; font-weight: 600; color: var(--text2);
}
.sum-pill span { color: var(--accent2); font-family: var(--mono); margin-left: 4px; }

/* Table */
.table-wrap {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r2); overflow: hidden; display: flex; flex-direction: column; min-height: 0;
}
.table-scroll { flex: 1; overflow-y: auto; }
.table-scroll::-webkit-scrollbar { width: 4px; }
.table-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

table { width: 100%; border-collapse: collapse; }
thead { position: sticky; top: 0; z-index: 10; background: var(--surface2); }
th {
  text-align: left; padding: 13px 18px;
  font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .07em;
  border-bottom: 1px solid var(--border);
}
td { padding: 13px 18px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:hover { background: var(--surface2); cursor: pointer; }

.badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; font-family: var(--mono);
  text-transform: uppercase;
}
.badge-cash { background: var(--green-dim); color: var(--green); border: 1px solid rgba(16, 185, 129, .2); }
.badge-bank { background: var(--accent-glow); color: var(--accent2); border: 1px solid rgba(96, 165, 250, .2); }

.mono { font-family: var(--mono); font-weight: 600; }
.muted { color: var(--text3); font-size: 12px; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.8);
  display: flex; align-items: center; justify-content: center;
  z-index: 500; opacity: 0; visibility: hidden;
  transition: all .2s; backdrop-filter: blur(4px);
}
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal-box {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 24px; width: 95%; max-width: 440px; overflow: hidden;
  transform: scale(.96); transition: transform .2s; display: flex; flex-direction: column; max-height: 90vh;
}
.modal-overlay.open .modal-box { transform: scale(1); }
.modal-top { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-body { padding: 24px; overflow-y: auto; flex: 1; }
.modal-body::-webkit-scrollbar { width: 4px; }
.modal-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* Receipt Style in Modal */
.r-head { text-align: center; margin-bottom: 24px; }
.r-shop { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; }
.r-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: var(--surface2); padding: 16px; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); }
.rm-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }
.rm-val { font-size: 13px; font-weight: 600; color: var(--text2); }

.r-items { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
.ri-row { display: flex; justify-content: space-between; align-items: flex-start; }
.ri-name { font-weight: 600; font-size: 14px; flex: 1; margin-right: 12px; }
.ri-qty { color: var(--text3); font-size: 12px; margin-top: 2px; }
.ri-tot { font-family: var(--mono); font-weight: 700; color: var(--text); }

.r-total { border-top: 1px dashed var(--border2); padding-top: 16px; margin-top: 16px; display: flex; justify-content: space-between; align-items: center; }
.rt-label { font-size: 14px; font-weight: 700; color: var(--text2); }
.rt-val { font-size: 26px; font-weight: 800; color: var(--green); font-family: var(--mono); }

.modal-foot { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--surface2); display: flex; gap: 12px; }
.mbtn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .2s; }
.mbtn-close { background: var(--surface3); color: var(--text2); }
.mbtn-print { background: var(--accent); color: #fff; }

</style>
</head>
<body>

<nav class="sidebar" id="sidebar"></nav>

<div class="main">
  <div class="topbar">
    <div class="tb-title">Sales History</div>
    <div class="tb-right"><span class="tb-sub">Transaction Log</span><div class="avatar" id="av">AD</div></div>
  </div>

  <div class="content">
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" id="search" placeholder="Search bill ID or customer..." oninput="render()">
      </div>
      <div class="date-tabs">
        <button class="tab-btn active" data-d="today" onclick="setPeriod('today', this)">Today</button>
        <button class="tab-btn" data-d="week" onclick="setPeriod('week', this)">This Week</button>
        <button class="tab-btn" data-d="month" onclick="setPeriod('month', this)">This Month</button>
        <button class="tab-btn" data-d="all" onclick="setPeriod('all', this)">All Time</button>
      </div>
      <select class="select-filter" id="payFilter" onchange="render()">
        <option value="">All Payments</option>
        <option value="cash">Cash Only</option>
        <option value="card">Card / Digital</option>
      </select>
    </div>

    <div class="summary-row" id="summary">
      <div class="sum-pill">Transactions <span id="sumCount">0</span></div>
      <div class="sum-pill">Total Revenue <span id="sumRev">LKR 0.00</span></div>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Bill ID</th>
              <th>Customer</th>
              <th>Items</th>
              <th>Method</th>
              <th style="text-align:right">Total</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="receiptModal">
  <div class="modal-box">
    <div class="modal-top"><div class="modal-title">Invoice Details</div><button class="mbtn-close" onclick="closeModal()" style="padding:4px; background:none; border:none; color:var(--text3); font-size:20px; cursor:pointer">&times;</button></div>
    <div class="modal-body" id="receiptBody"></div>
    <div class="modal-foot">
      <button class="mbtn mbtn-close" onclick="closeModal()">Close</button>
      <button class="mbtn mbtn-print" onclick="window.print()">Print Copy</button>
    </div>
  </div>
</div>

<script src="sidebar.js"></script>
<script>
let sales = JSON.parse(localStorage.getItem('quickpos-sales-history')) || [];
let period = 'today';

function setPeriod(p, btn) {
  period = p;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const query = document.getElementById('search').value.toLowerCase();
  const payType = document.getElementById('payFilter').value;

  const filtered = sales.filter(s => {
    // Basic filters
    if(query && !s.id.toLowerCase().includes(query) && !(s.customerName||'').toLowerCase().includes(query)) return false;
    if(payType && s.paymentMethod !== payType) return false;
    
    // Period filter
    const sd = new Date(s.date);
    const now = new Date();
    if(period === 'today') return sd.toDateString() === now.toDateString();
    if(period === 'week') {
      const weekAgo = new Date(); weekAgo.setDate(now.getDate() - 7);
      return sd >= weekAgo;
    }
    if(period === 'month') return sd.getMonth() === now.getMonth() && sd.getFullYear() === now.getFullYear();
    return true;
  }).reverse();

  // Summary
  const total = filtered.reduce((acc, s) => acc + s.total, 0);
  document.getElementById('sumCount').textContent = filtered.length;
  document.getElementById('sumRev').textContent = `LKR ${total.toLocaleString()}`;

  document.getElementById('tableBody').innerHTML = filtered.map(s => `
    <tr onclick="openReceipt('${s.id}')">
      <td class="muted">${s.time}</td>
      <td class="mono" style="color:var(--accent2)">#${s.id}</td>
      <td style="font-weight:600">${s.customerName || 'Walk-in'}</td>
      <td class="muted">${s.items.length} items</td>
      <td><span class="badge badge-${s.paymentMethod}">${s.paymentMethod}</span></td>
      <td class="mono" style="text-align:right; color:var(--green)">LKR ${s.total.toLocaleString()}</td>
    </tr>
  `).join('');
}

function openReceipt(id) {
  const s = sales.find(x => x.id == id);
  if(!s) return;
  document.getElementById('receiptBody').innerHTML = `
    <div class="r-head"><div class="r-shop">QuickPOS Pro</div><div class="muted">Transaction Receipt</div></div>
    <div class="r-meta">
      <div><div class="rm-label">Invoice #</div><div class="rm-val">${s.id}</div></div>
      <div><div class="rm-label">Date</div><div class="rm-val">${s.date} ${s.time}</div></div>
      <div><div class="rm-label">Method</div><div class="rm-val">${s.paymentMethod.toUpperCase()}</div></div>
      <div><div class="rm-label">Customer</div><div class="rm-val">${s.customerName || 'Walk-in'}</div></div>
    </div>
    <div class="r-items">
      ${s.items.map(i => `
        <div class="ri-row">
          <div class="ri-name">${i.name}<div class="ri-qty">${i.quantity} x LKR ${i.price.toLocaleString()}</div></div>
          <div class="ri-tot">LKR ${i.total.toLocaleString()}</div>
        </div>
      `).join('')}
    </div>
    <div class="r-total">
      <div class="rt-label">Grand Total</div>
      <div class="rt-val">LKR ${s.total.toLocaleString()}</div>
    </div>
  `;
  document.getElementById('receiptModal').classList.add('open');
}

function closeModal() { document.getElementById('receiptModal').classList.remove('open'); }

function init() {
  const user = JSON.parse(localStorage.getItem('quickpos-user'));
  if(user) document.getElementById('av').textContent = (user.username || 'AD').substring(0,2).toUpperCase();
  render();
}

init();
</script>
</body>
</html>
