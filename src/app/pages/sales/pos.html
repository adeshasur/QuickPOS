<style>
.pos-layout { display: grid; grid-template-columns: 1fr 380px; gap: 20px; flex: 1; overflow: hidden; }
.catalog-area { display: flex; flex-direction: column; gap: 16px; overflow: hidden; }
.cart-area { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r2); display: flex; flex-direction: column; overflow: hidden; }

.search-bar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 18px; width: 100%; color: var(--text); outline: none; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; overflow-y: auto; padding-right: 4px; }
.prod-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer; transition: all .2s; text-align: center; }
.prod-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 4px 12px var(--accent-glow); }
.prod-card .price { font-family: var(--mono); font-weight: 700; color: var(--green); margin-top: 8px; }

.cart-items { flex: 1; overflow-y: auto; padding: 16px; }
.cart-item { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.cart-foot { padding: 20px; background: var(--surface2); border-top: 1px solid var(--border); }
.total-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 16px; font-weight: 700; }
</style>
</head>
<body>

    <span class="sb-logo-text">QuickPOS Pro</span>

  </div>
  <div class="sb-nav">

    <a href="../dashboard/dashboard.html" class="nav-item"><span class="ni"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></span><span class="nt">Dashboard</span></a>

    <a href="../inventory/stock.html" class="nav-item"><span class="ni"><svg viewBox="0 0 24 24"><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg></span><span class="nt">Stock Control</span></a>

    <div class="sb-section-label">PEOPLE</div>

    <a href="../analytics/reports.html" class="nav-item"><span class="ni"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg></span><span class="nt">Reports</span></a>

    <div class="sb-section-label">SYSTEM</div>
    <a href="../system/settings.html" class="nav-item owner-only"><span class="ni"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/></svg></span><span class="nt">Settings</span></a>
  </div>
  <div class="sb-bottom">
    <a href="#" class="nav-item" id="logoutBtn"><span class="ni"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg></span><span class="nt">Logout</span></a>
  </div>

<div class="main">
  <div class="topbar">
    <div class="tb-title">Point of Sale</div>
    <div class="tb-right"><span class="tb-sub">...</span><div class="avatar">AD</div></div>
  </div>

  <div class="content">
    <div class="pos-layout">
      <div class="catalog-area">
        <input type="text" class="search-bar" id="pSearch" placeholder="Search products by name or SKU...">
        <div class="grid" id="productGrid"></div>
      </div>

      <div class="cart-area">
        <div style="padding:16px; border-bottom:1px solid var(--border)"><h3>Current Order</h3></div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-foot">
          <div class="total-row"><span>Subtotal</span><span id="subTotal">LKR 0.00</span></div>
          <div class="total-row" style="color:var(--accent2)"><span>Total</span><span id="grandTotal">LKR 0.00</span></div>
          <button class="btn btn-primary" style="width:100%; height:50px; font-size:16px; margin-top:10px" onclick="checkout()">Complete Transaction</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../../assets/js/core.js"></script>
<script>
let products = JSON.parse(localStorage.getItem('quickpos-products')) || [];
let cart = [];

function render() {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = products.map(p => `
    <div class="prod-card" onclick="addToCart(${p.id})">
      <div style="font-size:24px; margin-bottom:8px">📦</div>
      <div style="font-weight:600; font-size:13px">${p.name}</div>
      <div class="price">LKR ${p.finalPrice.toLocaleString()}</div>
    </div>
  `).join('');
  updateCartUI();
}

function addToCart(id) {
  const p = products.find(x => x.id == id);
  const existing = cart.find(x => x.id == id);
  if(existing) existing.qty++;
  else cart.push({ ...p, qty: 1 });
  updateCartUI();
}

function updateCartUI() {
  const items = document.getElementById('cartItems');
  items.innerHTML = cart.map(c => `
    <div class="cart-item">
      <div>
        <div style="font-weight:600">${c.name}</div>
        <div class="tb-sub">LKR ${c.finalPrice.toLocaleString()} x ${c.qty}</div>
      </div>
      <div style="font-weight:700">LKR ${(c.finalPrice * c.qty).toLocaleString()}</div>
    </div>
  `).join('');
  
  const total = cart.reduce((sum, item) => sum + (item.finalPrice * item.qty), 0);
  document.getElementById('subTotal').textContent = `LKR ${total.toLocaleString()}`;
  document.getElementById('grandTotal').textContent = `LKR ${total.toLocaleString()}`;
}

function checkout() {
  if(!cart.length) return;
  window.showToast('Transaction Completed!');
  cart = [];
  updateCartUI();
}

render();
</script>
</body>
</html>
