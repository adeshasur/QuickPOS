<div class="main">
  <div class="topbar">
    <div class="tb-title">Products</div>
    <div class="tb-right"><span class="tb-sub">...</span><div class="avatar">AD</div></div>
  </div>

  <div class="content">
    <div style="display:flex; justify-content:space-between; align-items:center">
      <div>
        <h2 class="page-heading">Product Catalog</h2>
        <p class="tb-sub">Manage items and pricing</p>
      </div>
      <button class="btn btn-primary" id="addProductBtn">+ Add New Product</button>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Category</th>
              <th>Type</th>
              <th>Stock</th>
              <th style="text-align:right">Price</th>
              <th style="text-align:right">Actions</th>
            </tr>
          </thead>
          <tbody id="productsTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="productModal">
  <div class="modal-box">
    <div class="modal-head"><h3 id="modalTitle">Add Product</h3><button onclick="closeModal('productModal')" class="tb-sub" style="background:none; border:none; cursor:pointer">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="label">Product Name</label><input type="text" id="pName" class="input"></div>
      <div class="form-group"><label class="label">Category</label><select id="pCat" class="select"></select></div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px">
        <div class="form-group"><label class="label">Base Price</label><input type="number" id="pPrice" class="input"></div>
        <div class="form-group"><label class="label">Stock</label><input type="number" id="pStock" class="input"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal('productModal')">Cancel</button>
      <button class="btn btn-primary" id="saveProductBtn">Save Product</button>
    </div>
  </div>
</div>

<script src="../../assets/js/core.js"></script>
<script>
let products = JSON.parse(localStorage.getItem('quickpos-products')) || [];
let categories = JSON.parse(localStorage.getItem('quickpos-categories')) || [];

function render() {
  const tbody = document.getElementById('productsTableBody');
  tbody.innerHTML = products.map(p => `
    <tr>
      <td class="td-name">${p.name}</td>
      <td class="td-cat">${categories.find(c => c.id == p.categoryId)?.name || '—'}</td>
      <td><span class="badge ${p.isWeighted ? 'badge-weight' : 'badge-unit'}">${p.isWeighted ? 'Weighted' : 'Unit'}</span></td>
      <td><span class="badge ${p.currentStock <= p.alertLevel ? 'badge-red' : 'badge-green'}">${p.currentStock}</span></td>
      <td style="text-align:right"><div class="price-final">LKR ${p.finalPrice.toLocaleString()}</div></td>
      <td style="text-align:right">
        <button class="btn btn-secondary" style="padding:5px 10px; font-size:11px" onclick="editProd(${p.id})">Edit</button>
      </td>
    </tr>
  `).join('');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.getElementById('addProductBtn').onclick = () => openModal('productModal');

// Populate categories
document.getElementById('pCat').innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

render();
</script>
</body>
</html>
