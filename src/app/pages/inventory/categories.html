<div class="main">
  <div class="topbar">
    <div class="tb-title">Categories</div>
    <div class="tb-right"><span class="tb-sub">...</span><div class="avatar">AD</div></div>
  </div>

  <div class="content">
    <div style="display:flex; justify-content:space-between; align-items:center">
      <div>
        <h2 class="page-heading">Product Categories</h2>
        <p class="tb-sub">Organize your inventory</p>
      </div>
      <button class="btn btn-primary" id="addCatBtn">+ Add Category</button>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Category Name</th>
              <th style="text-align:right">Actions</th>
            </tr>
          </thead>
          <tbody id="catTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="catModal">
  <div class="modal-box">
    <div class="modal-head"><h3>Category Details</h3></div>
    <div class="modal-body">
      <div class="form-group"><label class="label">Name</label><input type="text" id="catName" class="input"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal('catModal')">Cancel</button>
      <button class="btn btn-primary" id="saveCatBtn">Save</button>
    </div>
  </div>
</div>

<script src="../../assets/js/core.js"></script>
<script>
let categories = JSON.parse(localStorage.getItem('quickpos-categories')) || [];

function render() {
  const tbody = document.getElementById('catTableBody');
  tbody.innerHTML = categories.map(c => `
    <tr>
      <td>${c.id}</td>
      <td style="font-weight:600">${c.name}</td>
      <td style="text-align:right">
        <button class="btn btn-danger" style="padding:5px 10px; font-size:11px" onclick="deleteCat(${c.id})">Delete</button>
      </td>
    </tr>
  `).join('');
}

function deleteCat(id) {
  if(confirm('Delete category?')) {
    categories = categories.filter(c => c.id != id);
    localStorage.setItem('quickpos-categories', JSON.stringify(categories));
    render();
  }
}

document.getElementById('addCatBtn').onclick = () => { document.getElementById('catName').value=''; document.getElementById('catModal').classList.add('open'); };
document.getElementById('saveCatBtn').onclick = () => {
  const name = document.getElementById('catName').value;
  if(!name) return;
  categories.push({ id: Date.now(), name });
  localStorage.setItem('quickpos-categories', JSON.stringify(categories));
  document.getElementById('catModal').classList.remove('open');
  render();
};

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

render();
</script>
