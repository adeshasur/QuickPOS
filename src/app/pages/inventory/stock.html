<div class="main">
  <div class="topbar">
    <div class="tb-title">Stock Management</div>
    <div class="tb-right"><span class="tb-sub">...</span><div class="avatar">AD</div></div>
  </div>

  <div class="content">
    <div class="card" style="margin-bottom:20px">
      <h3 style="margin-bottom:16px">Stock Adjustment</h3>
      <div style="display:grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap:16px; align-items:flex-end">
        <div class="form-group"><label class="label">Product</label><select id="adjProd" class="select"></select></div>
        <div class="form-group"><label class="label">Action</label><select id="adjAction" class="select"><option value="add">Add (+)</option><option value="sub">Sub (-)</option></select></div>
        <div class="form-group"><label class="label">Quantity</label><input type="number" id="adjQty" class="input" value="1"></div>
        <button class="btn btn-primary" style="height:44px" onclick="adjustStock()">Update</button>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Product Name</th>
              <th>Current Level</th>
              <th>Min Alert</th>
              <th>Status</th>
              <th>Last Update</th>
            </tr>
          </thead>
          <tbody id="inventoryTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="../../assets/js/core.js"></script>
<script>
let products = JSON.parse(localStorage.getItem('quickpos-products')) || [];

function render() {
  const tbody = document.getElementById('inventoryTableBody');
  const sel = document.getElementById('adjProd');
  
  sel.innerHTML = products.map(p => `<option value="${p.id}">${p.name} (${p.currentStock})</option>`).join('');
  
  tbody.innerHTML = products.map(p => {
    const isLow = p.currentStock <= p.alertLevel;
    return `
      <tr>
        <td style="font-weight:600">${p.name}</td>
        <td style="font-family:var(--mono)">${p.currentStock}</td>
        <td style="font-family:var(--mono)">${p.alertLevel}</td>
        <td><span class="badge ${isLow ? 'badge-red' : 'badge-green'}">${isLow ? 'Low Stock' : 'Stable'}</span></td>
        <td style="color:var(--text3); font-size:12px">${new Date().toLocaleDateString()}</td>
      </tr>
    `;
  }).join('');
}

function adjustStock() {
  const id = document.getElementById('adjProd').value;
  const act = document.getElementById('adjAction').value;
  const qty = parseInt(document.getElementById('adjQty').value) || 0;
  
  const idx = products.findIndex(p => p.id == id);
  if(idx !== -1) {
    if(act === 'add') products[idx].currentStock += qty;
    else products[idx].currentStock = Math.max(0, products[idx].currentStock - qty);
    
    localStorage.setItem('quickpos-products', JSON.stringify(products));
    render();
    window.showToast('Stock level updated');
  }
}

render();
</script>
